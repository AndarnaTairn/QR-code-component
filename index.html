<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | QR code component</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
    
    /*THis is full screen i mean the little bluish space which is the full window*/
    .container{
      background-color: hsl(212, 45%, 89%);
      height: 100vh;
      width: 100vw;
      position:relative;
      display: flex;
      justify-content: center;
      align-items: center;

    }
    /*so this is the white box in the middle where the img qr is placed and the writings re written*/
    .card{
      background-color: hsl(0, 0%, 100%);
      height: auto;
      width: 300px;
      padding: 16px 16px 40px;
      border-radius: 20px;
      box-shadow:0 20px 30px rgba(0,0,0,0.08);
      text-align: center;
     
    }
    .card p {
    color:hsl(216,15%,48%);
    font-size:15px;
    line-height:1.5;
    font-weight:400;
}
    
    .card h1 {
      
    font-size:22px;
    font-weight:700;
    margin:24px 0 16px;
    color:hsl(218,44%,22%);

    }

    .card-image img{
     
    width: 100%;
    border-radius: 12px;
    display: block;
    margin-bottom: 24px;
}
  body{
    font-family: "Outfit", sans-serif;

}
    
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="card-image">
        <img src="images/image-qr-code.png" alt="">
      </div>

       <h1>Improve your front-end skills by building projects</h1>

      <p>
          Scan the QR code to visit Frontend Mentor and take your coding skills to the next level
      </p>
      
      

    </div>
    
  </div>
 
  
  
</body>
</html>
